# Build QwenPaw Desktop — Tauri only, upload per-platform immediately.

name: QwenPaw Desktop Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upload to an existing GitHub Release (tag name, e.g. v1.1.9b1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Tauri — Windows
  # ═══════════════════════════════════════════════════════════════════
  build-tauri-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content src/qwenpaw/__version__.py -Raw
          if ($content -match '__version__\s*=\s*"([^"]+)"') {
            $v = $Matches[1]
          } else {
            throw "Failed to extract version from __version__.py"
          }
          "version<<EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $v | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "EOF" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || github.event.inputs.release_tag }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        uses: negrutiu/nsis-install@v2

      - name: Clean dist directory
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build Tauri Windows package
        shell: pwsh
        run: ./scripts/pack-tauri/build_win_pyinstaller.ps1

      - name: Stage installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem "console/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $installer) { throw "No Tauri Windows installer found" }
          $target = "dist/QwenPaw-Setup-${{ steps.version.outputs.version }}.exe"
          Copy-Item -Force $installer.FullName $target
          Write-Host "Staged: $target"

      - name: Upload to GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/QwenPaw-Setup-*.exe

  # ═══════════════════════════════════════════════════════════════════
  # Tauri — macOS
  # ═══════════════════════════════════════════════════════════════════
  build-tauri-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        run: echo "version=$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src/qwenpaw/__version__.py)" >> $GITHUB_OUTPUT

      - name: Resolve release tag
        id: tag
        run: echo "tag=${{ github.event.release.tag_name || github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          PIP_NO_CACHE_DIR: "1"
        with:
          python-version: "3.10"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Clean dist directory
        run: rm -rf dist && mkdir -p dist

      - name: Build Tauri macOS package
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          chmod +x scripts/pack-tauri/build_macos_pyinstaller.sh
          bash scripts/pack-tauri/build_macos_pyinstaller.sh

      - name: Upload to GitHub Release
        if: steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/QwenPaw-*-macOS.zip
